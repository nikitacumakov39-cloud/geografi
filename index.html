<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Экономическая География Мира</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
    <!-- ECharts CDN -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@4.9.0/map/js/world.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <header>
                <h1>Экономика<br><span>Мировых Регионов</span></h1>
                <p>Интерактивная карта характеристик</p>
            </header>
            <nav id="region-nav" class="region-nav">
                <!-- Navigation buttons generated by JS -->
            </nav>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <div class="map-container">
                <div id="map"></div>
            </div>
            
            <!-- Info Sidebar / Overlay -->
            <div id="info-panel" class="info-panel hidden">
                <div class="panel-header">
                    <h2 id="info-title">Регион</h2>
                    <button id="close-panel" class="close-btn">&times;</button>
                </div>
                <div class="divider"></div>
                <p id="info-desc" class="main-desc">Выберите регион.</p>
                <div id="info-details" class="details-container">
                    <!-- Dynamic details -->
                </div>
            </div>
            
            <div id="placeholder-text" class="placeholder">
                <h2>Выберите материк</h2>
                <p>Нажмите на регион в меню слева или на карте, чтобы увидеть экономическую характеристику.</p>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
